<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Family Calendar</title>
  <link rel="stylesheet" href="styles.css?v=15" />
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=15"></script>
</head>
<body>
  <header class="app-header">
    <h1>Family Calendar</h1>
    <p class="subtitle">Igor &middot; Nataša &middot; Niki — Germany &amp; Croatia</p>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2>Layers</h2>
        <div id="filters" class="filters"></div>
      </section>

      <section class="panel">
        <h2 id="form-title">Add event</h2>
        <p class="hint">Tip: click any event in the calendar to edit or delete it.</p>
        <form id="add-form" class="add-form">
          <input type="hidden" id="f-id" />
          <label id="f-title-wrap">Title
            <input type="text" id="f-title" placeholder="e.g. Trip to Zagreb" />
          </label>
          <label>Category
            <select id="f-category"></select>
          </label>
          <label>Person (optional)
            <select id="f-person"></select>
          </label>
          <label>Start date
            <input type="date" id="f-start" required />
          </label>
          <label>End date (optional, inclusive)
            <input type="date" id="f-end" />
          </label>
          <label class="location-field" id="f-location-wrap">Location
            <select id="f-location">
              <option value="">—</option>
              <option value="DE">Germany</option>
              <option value="HR">Croatia</option>
            </select>
          </label>
          <label>Note (optional)
            <input type="text" id="f-note" placeholder="extra detail" />
          </label>
          <div class="form-buttons">
            <button type="submit" id="save-btn">Add event</button>
            <button type="button" id="delete-btn" class="danger" hidden>Delete</button>
            <button type="button" id="cancel-btn" class="secondary" hidden>Cancel</button>
          </div>
        </form>
      </section>
    </aside>

    <section class="calendar-wrap">
      <div id="calendar"></div>
      <p id="status" class="status"></p>
    </section>
  </main>

  <script src="app.js?v=15"></script>
</body>
</html>
